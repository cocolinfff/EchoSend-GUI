name: Build and Release (win/linux x86/x64/arm64)

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.os }}-${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows
            runner: windows-latest
            target: i686-pc-windows-msvc
            ext: .exe
          - os: windows
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            ext: .exe
          - os: windows
            runner: windows-latest
            target: aarch64-pc-windows-msvc
            ext: .exe
          - os: linux
            runner: ubuntu-latest
            target: i686-unknown-linux-gnu
            ext: ""
          - os: linux
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
          - os: linux
            runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            ext: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev patchelf

      - name: Install frontend deps
        run: npm ci

      - name: Build binary with zig
        shell: bash
        run: |
          cd src-tauri
          cargo zigbuild --release --target ${{ matrix.target }}

      - name: Package artifact
        shell: bash
        run: |
          mkdir -p dist
          src="src-tauri/target/${{ matrix.target }}/release/echosend_gui_tauri${{ matrix.ext }}"
          dst="dist/echosend-gui-${{ matrix.target }}${{ matrix.ext }}"
          cp "$src" "$dst"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: echosend-gui-${{ matrix.target }}
          path: dist/echosend-gui-${{ matrix.target }}${{ matrix.ext }}

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create release and upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**
          generate_release_notes: true
