name: Build and Release (win/linux x86/x64/arm64)

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g. v1.0.0). Leave empty to skip creating a release.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x86
            runner: windows-latest
            target: i686-pc-windows-msvc
            os_name: windows
            arch: x86
            ext: .exe
          - name: windows-x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            os_name: windows
            arch: x64
            ext: .exe
          - name: windows-arm64
            runner: windows-latest
            target: aarch64-pc-windows-msvc
            os_name: windows
            arch: arm64
            ext: .exe
          - name: linux-x64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            os_name: linux
            arch: x64
            ext: ""
          - name: linux-arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            os_name: linux
            arch: arm64
            ext: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Generate icon.png from icon.ico
        shell: bash
        run: |
          if command -v magick &>/dev/null; then
            magick src-tauri/icons/icon.ico src-tauri/icons/icon.png
          elif command -v convert &>/dev/null; then
            convert src-tauri/icons/icon.ico src-tauri/icons/icon.png
          else
            python3 -m pip install Pillow --break-system-packages --quiet
            python3 -c "from PIL import Image;img = Image.open('src-tauri/icons/icon.ico');img.save('src-tauri/icons/icon.png', 'PNG')"
          fi

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev patchelf

      - name: Install frontend deps
        run: npm ci

      - name: Build binary
        shell: bash
        run: |
          cd src-tauri
          cargo build --release --target ${{ matrix.target }}

      - name: Package artifact
        shell: bash
        run: |
          mkdir -p dist
          src="src-tauri/target/${{ matrix.target }}/release/echosend_gui_tauri${{ matrix.ext }}"
          dst="dist/EchoSend-${{ matrix.os_name }}-${{ matrix.arch }}${{ matrix.ext }}"
          cp "$src" "$dst"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: EchoSend-${{ matrix.os_name }}-${{ matrix.arch }}
          path: dist/EchoSend-${{ matrix.os_name }}-${{ matrix.arch }}${{ matrix.ext }}

  release:
    name: Create GitHub Release
    if: github.event.inputs.tag_name != ''
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create release and upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          files: release-assets/**
          generate_release_notes: true
